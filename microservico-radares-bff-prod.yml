server:
  port: 8081

elasticsearch:
  host: elasticsearch
  port: 9200

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka/

spring:
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}
  cache:
    type: simple

  security:
    oauth2:
      resourceserver:
        jwt:
          # Define a URL que o BFF deve esperar como Issuer
          issuer-uri: http://192.168.0.6:8180/realms/radares-realm

# --- RESILIENCE4J CIRCUIT BREAKER (Formato YAML limpo) ---
resilience4j:
  timelimiter:
    configs:
      default:
        timeout-duration: 4s
    instances:
      listarKms: # ← instância específica para KMs
        timeout-duration: 45s         # mais tempo pois a query é pesada
      listRodovias:
        timeout-duration: 45s
      buscaPlaca:
        timeout-duration: 60s         # busca histórica pode ser lenta
      radaresLocal:
        timeout-duration: 45s
      geoSearch:
        timeout-duration: 45s
      genericList:
        timeout-duration: 20s
      locationsService:
        timeout-duration: 10s
  circuitbreaker:
    configs:
      default:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      radaresService:
        base-config: default
        sliding-window-size: 20
      monitoramentoService:
        base-config: default